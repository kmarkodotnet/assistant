name: Security

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

jobs:
  privacy-assertion:
    name: Privacy Assertion Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore FamilyOs.sln
      - name: Build
        run: dotnet build FamilyOs.sln --no-restore
      - name: Privacy Assertion Tests (RED GATE)
        run: dotnet test tests/FamilyOs.Infrastructure.Ai.Tests/ --filter "FullyQualifiedName~PrivacyGuard" --no-build

  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          artifact_name: 'zap-report'
        continue-on-error: true
