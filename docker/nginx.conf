server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # index.html must never be cached so that new deployments
    # are picked up immediately and old chunk hashes are not served.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed static assets (JS/CSS bundles, fonts, images) can be cached
    # forever because their filenames change with every build.
    # IMPORTANT: use try_files $uri =404 instead of the SPA fallback so that
    # a missing old-build chunk returns a real 404 (not index.html as JS).
    location ~* \.(js|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA routing: all other paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
