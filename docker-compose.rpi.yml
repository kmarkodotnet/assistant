# Raspberry Pi felülbírálás (arm64 VAGY 32-bit arm/v7 Pi-hez egyaránt).
#
# A docker/*.Dockerfile-ok natívan is buildelhetők a Pi-n (minden bázis-image
# publikál a Pi architektúrájának megfelelő variánst — arm64-hez ÉS
# arm/v7-hez is), de a `dotnet publish` + `npm run build` erős gépet igényel
# — Pi 4/5-ön is 15-30 percig elhúzódhat buildenként. Ez a fájl arra szolgál,
# hogy előre, egy erősebb gépen (buildx + QEMU) elkészített image-eket
# használjunk a build: szakaszok helyett.
#
# Két topológia (lásd docs/deploy-raspberry-pi.md 5. szakasz):
#
#   A) 32-bit Pi + külön "erős PC" (AJÁNLOTT, ha az Ollama amúgy is más
#      gépen fut): a Pi CSAK az api/workers/web-et futtatja — ehhez a
#      postgres és ollama service NEM indul el a Pi-n, a DB_HOST/OLLAMA_HOST
#      env változók a másik gép LAN IP-jére mutatnak. Lásd `make rpi-up`
#      (--no-deps-szel, hogy a postgres/ollama service ne induljon el
#      helyben) és a docker-compose.strong-pc.yml-t a másik gépen.
#
#   B) 64-bit Pi, minden egy gépen: a postgres és ollama IS a Pi-n fut,
#      DB_HOST/OLLAMA_HOST üresen hagyva (alapértelmezett: a compose-belső
#      "postgres"/"ollama" service-név). Lásd `make rpi-up-all`.
#
# A --no-build minden esetben kötelező: enélkül Compose megpróbálná
# lokálisan (is) buildelni a build: szakaszt, ha az image még nem létezik
# pontosan a megadott tag alatt.
#
# Image-forrás kiválasztása .env-ben:
#   RPI_IMAGE_PREFIX=                       → helyi `docker load`-dal betöltött image (lásd `make rpi-save`)
#   RPI_IMAGE_PREFIX=docker.io/felhasznalo/ → registry-ből húzott image (lásd `make rpi-push`)
#   RPI_TAG=arm64-latest / armv7-latest     → az image tag (Pi architektúrája szerint)
#   DB_HOST=                                → üres = "postgres" (helyi), vagy az erős PC LAN IP-je (pl. 192.168.1.50)
#   OLLAMA_HOST=                            → üres = "ollama" (helyi), vagy az erős PC LAN IP-je

services:
  api:
    image: ${RPI_IMAGE_PREFIX:-}family-os-api:${RPI_TAG:-arm64-latest}
    mem_limit: ${RPI_API_MEM_LIMIT:-512m}
    environment:
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-postgres};Port=5432;Database=family_os;Username=family_app;Password=${APP_DB_PASSWORD:-changeme}"
      Ollama__BaseUrl: "http://${OLLAMA_HOST:-ollama}:11434"

  workers:
    image: ${RPI_IMAGE_PREFIX:-}family-os-workers:${RPI_TAG:-arm64-latest}
    mem_limit: ${RPI_WORKERS_MEM_LIMIT:-768m}
    environment:
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST:-postgres};Port=5432;Database=family_os;Username=family_app;Password=${APP_DB_PASSWORD:-changeme}"
      Ollama__BaseUrl: "http://${OLLAMA_HOST:-ollama}:11434"

  web:
    image: ${RPI_IMAGE_PREFIX:-}family-os-web:${RPI_TAG:-arm64-latest}
    mem_limit: ${RPI_WEB_MEM_LIMIT:-128m}

  # Csak a B) topológiánál (64-bit Pi, postgres/ollama IS helyben fut)
  # releváns — A) topológia esetén a `make rpi-up` --no-deps miatt ezek a
  # service-definíciók egyszerűen nem indulnak el a Pi-n.
  postgres:
    mem_limit: ${RPI_POSTGRES_MEM_LIMIT:-512m}

  ollama:
    mem_limit: ${RPI_OLLAMA_MEM_LIMIT:-3g}
